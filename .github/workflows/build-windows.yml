name: Build Windows Package

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve app version
        id: app_version
        shell: pwsh
        run: |
          $v = python -c "from utils.version import APP_VERSION; print(APP_VERSION)"
          "value=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Run pre-release checks
        shell: pwsh
        run: |
          python scripts/pre_release_checks.py

      - name: Build Windows package
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File build_windows.ps1

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v4
        with:
          name: DishBoard-${{ steps.app_version.outputs.value }}-windows
          path: dist/DishBoard-${{ steps.app_version.outputs.value }}-windows.zip
          if-no-files-found: error
